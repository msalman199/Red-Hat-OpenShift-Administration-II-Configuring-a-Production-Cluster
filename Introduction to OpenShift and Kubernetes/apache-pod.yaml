apiVersion: v1
kind: Pod
metadata:
  name: apache-pod
  namespace: lab-demo
  labels:
    app: apache
    environment: lab
spec:
  containers:
  - name: apache-container
    image: httpd:2.4
    ports:
    - containerPort: 80
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"
